name: Daily Diesel Price Email

on:
  schedule:
    - cron: '0 21 * * *'   # 7:00 AM AEST
  workflow_dispatch:

jobs:
  send-fuel-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fuel price emailer
        env:
          FUEL_API_TOKEN: ${{ secrets.FUEL_API_TOKEN }}
          M365_EMAIL:     ${{ secrets.M365_EMAIL }}
          M365_PASSWORD:  ${{ secrets.M365_PASSWORD }}
          RECIPIENTS:     ${{ secrets.RECIPIENTS }}
        run: python fuel_email.py

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices.json [skip ci]"
          git push
